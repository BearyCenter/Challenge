function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

function useParallax(ref, speed = 0.35) {
  useEffect(() => {
    if (!ref.current) return;
    const handle = () => {
      const y = window.scrollY * speed;
      if (ref.current) ref.current.style.transform = `translateY(${y}px)`;
    };
    window.addEventListener("scroll", handle, { passive: true });
    return () => window.removeEventListener("scroll", handle);
  }, [speed]);
}

function useSectionParallax(sectionRef, { backgroundRef, contentRef, accentRef, backgroundSpeed = 0.12, contentSpeed = 0.05, accentSpeed = 0.16 } = {}) {
  useEffect(() => {
    if (!sectionRef.current) return;

    const update = () => {
      if (!sectionRef.current) return;
      const rect = sectionRef.current.getBoundingClientRect();
      const viewportHeight = window.innerHeight || 1;
      const distanceFromCenter = rect.top + rect.height / 2 - viewportHeight / 2;

      if (backgroundRef && backgroundRef.current) {
        backgroundRef.current.style.transform = `translate3d(0, ${distanceFromCenter * -backgroundSpeed}px, 0)`;
      }

      if (contentRef && contentRef.current) {
        contentRef.current.style.transform = `translate3d(0, ${distanceFromCenter * -contentSpeed}px, 0)`;
      }

      if (accentRef && accentRef.current) {
        accentRef.current.style.transform = `translate3d(0, ${distanceFromCenter * -accentSpeed}px, 0)`;
      }
    };

    update();
    window.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);

    return () => {
      window.removeEventListener("scroll", update);
      window.removeEventListener("resize", update);
    };
  }, [sectionRef, backgroundRef, contentRef, accentRef, backgroundSpeed, contentSpeed, accentSpeed]);
}

/* ── APP ────────────────────────────────────────────── */
function App() {
  const [booking, setBooking] = useState(false);
  const [promotionOpen, setPromotionOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [showBackToTop, setShowBackToTop] = useState(false);

  useScrollReveal();

  useEffect(() => {
    // Loader
    const t = setTimeout(() => {
      const loader = document.getElementById("loader");
      if (loader) loader.classList.add("out");
    }, 1200);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    const h = () => {
      setScrolled(window.scrollY > 60);
      setShowBackToTop(window.scrollY > Math.max(window.innerHeight * 0.85, 520));
    };
    window.addEventListener("scroll", h, { passive: true });
    h();
    return () => window.removeEventListener("scroll", h);
  }, []);

  useEffect(() => {
    const previousOverflow = document.body.style.overflow;
    if (booking || promotionOpen || menuOpen) document.body.style.overflow = "hidden";
    else document.body.style.overflow = "";
    return () => { document.body.style.overflow = previousOverflow; };
  }, [booking, promotionOpen, menuOpen]);

  useEffect(() => {
    const onKeyDown = (event) => {
      if (event.key === "Escape") setMenuOpen(false);
    };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, []);

  const handleNavigate = useCallback((target) => {
    setMenuOpen(false);
    const element = document.getElementById(target);
    if (element) {
      const top = element.getBoundingClientRect().top + window.scrollY - 88;
      window.scrollTo({ top, behavior: "smooth" });
    }
  }, []);

  return (
    <>
      <Nav
        onBook={() => setBooking(true)}
        scrolled={scrolled}
        onMenuOpen={() => setMenuOpen(true)}
        onNavigate={handleNavigate}
      />
      <Hero onBook={() => setBooking(true)} />
      <FeaturesStrip />
      <VillasSection onBook={() => setBooking(true)} />
        <ExperienceSection />
        <FullBleedQuote />
        <Footer onBook={() => setBooking(true)} />
        <SpecialOfferButton visible={true} onClick={() => setPromotionOpen(true)} />
        <BackToTopButton visible={showBackToTop} onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} />
        {menuOpen && <MenuOverlay onClose={() => setMenuOpen(false)} onNavigate={handleNavigate} onBook={() => setBooking(true)} />}
        {promotionOpen && <PromotionModal onClose={() => setPromotionOpen(false)} onBook={() => setBooking(true)} />}
        {booking && <BookingModal onClose={() => setBooking(false)} />}
      </>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
