<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Azure Phuket — Private Villa Resort</title>
<link rel="stylesheet" href="../../fonts/fonts.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script>window.React = React;</script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: "Manrope", "Segoe UI", sans-serif; background: #0d0f1a; color: #1D2340; overflow-x: hidden; }
  :root {
    --gold: #D4AF37; --gold-light: #F4E7B0; --gold-dim: rgba(212,175,55,0.35);
    --lilac: #DCD0FF; --sea: #AFEEEE;
    --navy: #1D2340; --midnight: #0d0f1a; --navy2: #111522;
    --ivory: #F8F6F1; --paper: #FFFDF9; --ink: #5F6478;
    --border: rgba(29,35,64,0.10); --border-light: rgba(255,255,255,0.12);
    --r: 3px;
    --font-display: "Cormorant Garamond", "Palatino Linotype", serif;
    --font-body: "Manrope", "Segoe UI", sans-serif;
  }
  a { text-decoration: none; color: inherit; }
  button { font-family: var(--font-body); cursor: pointer; border: none; background: none; }

  /* ── Loading screen ── */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: #0d0f1a;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 600ms ease, visibility 600ms ease;
  }
  #loader.out { opacity: 0; visibility: hidden; }
  .loader-logo {
    animation: loaderPulse 1.2s ease-in-out infinite alternate;
  }
  @keyframes loaderPulse { from { opacity: 0.3; } to { opacity: 1; } }

  /* ── Scroll reveal ── */
  .reveal { opacity: 0; transform: translateY(32px); transition: opacity 700ms cubic-bezier(0.25,0.46,0.45,0.94), transform 700ms cubic-bezier(0.25,0.46,0.45,0.94); }
  .reveal.visible { opacity: 1; transform: none; }
  .reveal-delay-1 { transition-delay: 100ms; }
  .reveal-delay-2 { transition-delay: 200ms; }
  .reveal-delay-3 { transition-delay: 350ms; }

  /* ── Parallax hero ── */
  .parallax-bg {
    will-change: transform;
    transition: transform 0s linear;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 800;
    backdrop-filter: blur(18px) brightness(0.55);
    display: flex; align-items: center; justify-content: center;
    animation: modalIn 320ms cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }
  @keyframes modalIn {
    from { opacity: 0; backdrop-filter: blur(0px) brightness(1); }
    to   { opacity: 1; backdrop-filter: blur(18px) brightness(0.55); }
  }
  .modal-box {
    animation: modalBoxIn 380ms cubic-bezier(0.25,0.46,0.45,0.94) forwards;
  }
  @keyframes modalBoxIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Nav ── */
  .nav-link {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(255,255,255,0.72);
    background: none; border: none; cursor: pointer;
    transition: color 180ms ease;
    font-family: var(--font-body);
    padding: 4px 0;
  }
  .nav-link:hover { color: var(--gold); }

  /* ── Section titles ── */
  .section-eye {
    font-size: 10px; font-weight: 700; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--gold);
    display: block; margin-bottom: 12px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0d0f1a; }
  ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.35); border-radius: 2px; }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">
    <svg width="48" height="48" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <text x="30" y="145" font-size="120" font-family="'Cormorant Garamond',serif" font-weight="500" fill="white">A</text>
      <line x1="95" y1="38" x2="115" y2="162" stroke="#D4AF37" stroke-width="3"/>
      <text x="100" y="145" font-size="120" font-family="'Cormorant Garamond',serif" font-weight="500" fill="white">P</text>
    </svg>
  </div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── DATA ───────────────────────────────────────────── */
const VILLAS = [
  {
    id: "romance", type: "TYPE A", tag: "Romance",
    name: "1-Bedroom\nRomance Villa",
    size: "150 m²", capacity: "2 Guests", bed: "1 King Bed",
    view: "Tropical Garden",
    price: "฿12,500", priceNote: "per night · breakfast incl.",
    amenities: ["6m Private Pool","Freestanding Jacuzzi","Outdoor Rain Shower","Floating Breakfast"],
    img: "../../assets/images/phuket1.png",
    accent: "#DCD0FF",
  },
  {
    id: "family", type: "TYPE B", tag: "Family",
    name: "3-Bedroom\nFamily Oasis",
    size: "350 m²", capacity: "6+2 Guests", bed: "2 King + 2 Twin",
    view: "Private Lake & Garden",
    price: "฿28,000", priceNote: "per night · breakfast incl.",
    amenities: ["10m L-Shape Pool","BBQ Pavilion","Sunken Lounge","Pantry Kitchen"],
    img: "../../assets/images/phuket4.png",
    accent: "#AFEEEE",
  },
  {
    id: "ocean", type: "TYPE C", tag: "Signature",
    name: "4-Bedroom\nOcean Signature",
    size: "550 m²", capacity: "8 Guests", bed: "4 King Beds",
    view: "Panoramic Ocean & Sunset",
    price: "฿55,000", priceNote: "per night · breakfast + transfer incl.",
    amenities: ["15m Marble Lap Pool","Private Spa Room","Wine Cellar","24h Butler"],
    img: "../../assets/images/phuket6.png",
    accent: "#D4AF37",
  },
];

const FEATURES = [
  "100% Privacy Guaranteed",
  "24/7 Butler Service",
  "In-Villa Private Chef",
  "Floating Breakfast",
  "Complimentary Transfer",
];

/* ── HOOKS ──────────────────────────────────────────── */
function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

function useParallax(ref, speed = 0.35) {
  useEffect(() => {
    if (!ref.current) return;
    const handle = () => {
      const y = window.scrollY * speed;
      if (ref.current) ref.current.style.transform = `translateY(${y}px)`;
    };
    window.addEventListener("scroll", handle, { passive: true });
    return () => window.removeEventListener("scroll", handle);
  }, [speed]);
}

/* ── BOOKING MODAL ──────────────────────────────────── */
function BookingModal({ onClose }) {
  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{ width: "min(94vw,480px)", position: "relative", display: "flex", flexDirection: "column" }} onClick={e => e.stopPropagation()}>

        {/* Top — brand identity, airy */}
        <div style={{ padding: "40px 36px 24px", textAlign: "center" }}>
          <svg width="30" height="30" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style={{ marginBottom: 10 }}>
            <text x="30" y="145" fontSize="120" fontFamily="'Cormorant Garamond',serif" fontWeight="500" fill="white">A</text>
            <line x1="95" y1="38" x2="115" y2="162" stroke="#D4AF37" strokeWidth="3"/>
            <text x="100" y="145" fontSize="120" fontFamily="'Cormorant Garamond',serif" fontWeight="500" fill="white">P</text>
          </svg>
          <h2 style={{ fontFamily: "var(--font-display)", fontSize: 30, fontWeight: 500, fontStyle: "italic", color: "white", lineHeight: 1, marginBottom: 6 }}>Reserve Your Stay</h2>
          <p style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", letterSpacing: "0.1em" }}>Bang Tao Beach · Phuket</p>
        </div>

        {/* Bottom — action panel */}
        <div style={{ background: "rgba(13,15,26,0.98)", border: "1px solid rgba(212,175,55,0.16)", borderRadius: "var(--r)", padding: "28px 36px 32px", position: "relative" }}>
          <button onClick={onClose} style={{ position: "absolute", top: 14, right: 18, color: "rgba(255,255,255,0.3)", fontSize: 15, lineHeight: 1, background: "none", border: "none", cursor: "pointer" }}>✕</button>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            {[{ label: "Check In", type: "date" }, { label: "Check Out", type: "date" }].map(({ label, type }) => (
              <div key={label}>
                <label style={{ display: "block", fontSize: 9, fontWeight: 700, letterSpacing: "0.18em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: 5 }}>{label}</label>
                <input type={type} style={{ width: "100%", height: 42, borderRadius: "var(--r)", border: "1px solid rgba(255,255,255,0.12)", padding: "0 11px", fontFamily: "var(--font-body)", fontSize: 13, color: "white", background: "rgba(255,255,255,0.04)", outline: "none" }} />
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
            {[
              { label: "Guests", opts: ["2 Guests","4 Guests","6 Guests","8 Guests"] },
              { label: "Villa Type", opts: ["1BR Romance Villa","3BR Family Oasis","4BR Ocean Signature"] }
            ].map(({ label, opts }) => (
              <div key={label}>
                <label style={{ display: "block", fontSize: 9, fontWeight: 700, letterSpacing: "0.18em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: 5 }}>{label}</label>
                <select style={{ width: "100%", height: 42, borderRadius: "var(--r)", border: "1px solid rgba(255,255,255,0.12)", padding: "0 11px", fontFamily: "var(--font-body)", fontSize: 13, color: "white", background: "#1a1d2b", outline: "none" }}>
                  {opts.map(o => <option key={o}>{o}</option>)}
                </select>
              </div>
            ))}
          </div>

          <button style={{ width: "100%", height: 48, background: "var(--gold)", color: "#0d0f1a", fontWeight: 700, fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", borderRadius: "var(--r)", border: "none", cursor: "pointer", fontFamily: "var(--font-body)", boxShadow: "0 8px 24px rgba(212,175,55,0.26)" }}>
            Check Availability
          </button>
          <p style={{ fontSize: 10, color: "rgba(255,255,255,0.2)", textAlign: "center", marginTop: 10 }}>Free cancellation · 48 hours before arrival</p>
        </div>
      </div>
    </div>
  );
}

/* ── NAV ────────────────────────────────────────────── */
function Nav({ onBook, scrolled }) {
  return (
    <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 300, height: 68, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 48px", transition: "background 300ms ease", background: scrolled ? "rgba(13,15,26,0.92)" : "transparent", backdropFilter: scrolled ? "blur(12px)" : "none", borderBottom: scrolled ? "1px solid rgba(255,255,255,0.06)" : "none" }}>
      {/* Left nav */}
      <div style={{ display: "flex", gap: 32, alignItems: "center" }}>
        <button style={{ display: "flex", flexDirection: "column", gap: 4.5, padding: 0, background: "none", border: "none", cursor: "pointer" }}>
          {[0,1,2].map(i => <span key={i} style={{ display: "block", width: i === 1 ? 16 : 20, height: 1, background: "rgba(255,255,255,0.7)" }} />)}
        </button>
        <button className="nav-link">Villas</button>
        <button className="nav-link">Wellness</button>
        <button className="nav-link">Experiences</button>
      </div>

      {/* Center logo */}
      <div style={{ position: "absolute", left: "50%", transform: "translateX(-50%)", textAlign: "center" }}>
        <svg width="28" height="28" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <text x="30" y="145" fontSize="120" fontFamily="'Cormorant Garamond',serif" fontWeight="500" fill="white">A</text>
          <line x1="95" y1="38" x2="115" y2="162" stroke="#D4AF37" strokeWidth="3"/>
          <text x="100" y="145" fontSize="120" fontFamily="'Cormorant Garamond',serif" fontWeight="500" fill="white">P</text>
        </svg>
        <div style={{ fontSize: 8, fontWeight: 600, letterSpacing: "0.28em", textTransform: "uppercase", color: "rgba(255,255,255,0.4)", marginTop: 2 }}>THE AZURE · PHUKET</div>
      </div>

      {/* Right — BOOK NOW only */}
      <button onClick={onBook} style={{ padding: "11px 22px", border: "1px solid var(--gold)", borderRadius: "var(--r)", background: "transparent", color: "var(--gold)", fontSize: 11, fontWeight: 700, letterSpacing: "0.18em", textTransform: "uppercase", fontFamily: "var(--font-body)", transition: "background 200ms ease, color 200ms ease" }}
        onMouseEnter={e => { e.currentTarget.style.background = "var(--gold)"; e.currentTarget.style.color = "#0d0f1a"; }}
        onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = "var(--gold)"; }}>
        Book Now
      </button>
    </nav>
  );
}

/* ── HERO ───────────────────────────────────────────── */
function Hero({ onBook }) {
  const bgRef = useRef(null);
  useParallax(bgRef, 0.3);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setLoaded(true), 200);
    return () => clearTimeout(t);
  }, []);

  return (
    <section style={{ position: "relative", height: "100vh", overflow: "hidden", display: "flex", alignItems: "flex-end" }}>
      {/* Parallax background */}
      <div ref={bgRef} className="parallax-bg" style={{ position: "absolute", inset: "-15% 0", backgroundImage: "url('../../assets/images/phuket1.png')", backgroundSize: "cover", backgroundPosition: "center 30%" }} />

      {/* Overlays */}
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(13,15,26,0.92) 0%, rgba(13,15,26,0.4) 45%, rgba(13,15,26,0.12) 100%)" }} />
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(ellipse at bottom center, rgba(29,35,64,0.5), transparent 70%)" }} />

      {/* Left vertical labels */}
      <div style={{ position: "absolute", left: 48, top: "50%", transform: "translateY(-50%)", display: "flex", flexDirection: "column", gap: 8, opacity: loaded ? 1 : 0, transition: "opacity 900ms 600ms ease" }}>
        {["Private", "Luxury", "Phuket"].map((l, i) => (
          <div key={l} style={{ writingMode: "vertical-rl", textOrientation: "mixed", fontSize: 10, fontWeight: 600, letterSpacing: "0.22em", textTransform: "uppercase", color: i === 0 ? "white" : "rgba(255,255,255,0.35)", padding: "10px 4px", background: i === 0 ? "rgba(255,255,255,0.07)" : "transparent", border: i === 0 ? "1px solid rgba(255,255,255,0.14)" : "none", borderRadius: "var(--r)" }}>{l}</div>
        ))}
      </div>

      {/* Bottom content */}
      <div style={{ position: "relative", zIndex: 2, width: "100%", padding: "0 48px 64px", textAlign: "center" }}>
        {/* Eyebrow */}
        <p style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.28em", textTransform: "uppercase", color: "var(--gold)", marginBottom: 20, opacity: loaded ? 1 : 0, transform: loaded ? "none" : "translateY(16px)", transition: "opacity 700ms 300ms ease, transform 700ms 300ms ease" }}>
          Bang Tao Beach · Phuket, Thailand
        </p>

        {/* Big tracked headline */}
        <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: "clamp(2.6rem,4.5vw,5rem)", letterSpacing: "0.22em", textTransform: "uppercase", color: "white", lineHeight: 1, marginBottom: 20, opacity: loaded ? 1 : 0, transform: loaded ? "none" : "translateY(24px)", transition: "opacity 800ms 450ms ease, transform 800ms 450ms ease" }}>
          Private
          <span style={{ fontStyle: "italic", color: "var(--gold-light)", letterSpacing: "0.16em" }}> Escape</span>
        </h1>

        {/* Sub line */}
        <p style={{ fontSize: 14, color: "rgba(255,255,255,0.55)", letterSpacing: "0.08em", maxWidth: "50ch", margin: "0 auto 36px", lineHeight: 1.7, opacity: loaded ? 1 : 0, transform: loaded ? "none" : "translateY(16px)", transition: "opacity 700ms 600ms ease, transform 700ms 600ms ease" }}>
          Luxury pool villas with 24-hour butler service — where every detail is considered
        </p>

        {/* Scroll indicator */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, opacity: loaded ? 0.5 : 0, transition: "opacity 800ms 900ms ease" }}>
          <div style={{ width: 1, height: 40, background: "linear-gradient(to bottom, transparent, var(--gold))" }} />
          <span style={{ fontSize: 9, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(255,255,255,0.5)" }}>Scroll</span>
        </div>
      </div>

      {/* Scroll-down divider gradient */}
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 2, background: "linear-gradient(to right, transparent, rgba(212,175,55,0.4), transparent)" }} />
    </section>
  );
}

/* ── FEATURES STRIP ─────────────────────────────────── */
function FeaturesStrip({ onBook }) {
  return (
    <div style={{ background: "#13151f", borderBottom: "1px solid rgba(255,255,255,0.05)", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
      <div style={{ maxWidth: 1280, margin: "0 auto", display: "flex", alignItems: "center", padding: "0 48px" }}>
        {/* Inline text CTA — same visual weight as features */}
        <button onClick={onBook} style={{ background: "transparent", color: "rgba(212,175,55,0.75)", padding: "0 20px 0 0", fontSize: 10, fontWeight: 700, letterSpacing: "0.2em", textTransform: "uppercase", border: "none", borderRight: "1px solid rgba(255,255,255,0.07)", cursor: "pointer", flexShrink: 0, fontFamily: "var(--font-body)", marginRight: 20, lineHeight: 1.7, whiteSpace: "nowrap" }}>
          Get Special<br/>Privileges →
        </button>
        {FEATURES.map((f, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 7, padding: "14px 18px", borderRight: i < FEATURES.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
              <circle cx="8" cy="8" r="7" stroke="rgba(212,175,55,0.4)" strokeWidth="1"/>
              <path d="M4.5 8l2.5 2.5 4.5-5" stroke="var(--gold)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            <span style={{ fontSize: 10, color: "rgba(255,255,255,0.38)", letterSpacing: "0.08em", whiteSpace: "nowrap" }}>{f}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── VILLAS SECTION ─────────────────────────────────── */
function VillasSection({ onBook }) {
  const [active, setActive] = useState(0);
  const villa = VILLAS[active];

  return (
    <section style={{ background: "#0d0f1a", padding: "120px 0" }}>
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "0 48px" }}>
        {/* Header */}
        <div className="reveal" style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 64 }}>
          <div>
            <span className="section-eye">Our Collection</span>
            <h2 style={{ fontFamily: "var(--font-display)", fontSize: "clamp(3rem,5vw,5rem)", fontWeight: 500, color: "white", lineHeight: 0.95, letterSpacing: "0.04em" }}>
              Private Villa<br/><span style={{ fontStyle: "italic", color: "var(--gold-light)" }}>Selection</span>
            </h2>
          </div>
          <p style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", maxWidth: "28ch", lineHeight: 1.75, textAlign: "right" }}>
            Every villa features a private pool, dedicated butler, and complete seclusion
          </p>
        </div>

        {/* Villa selector tabs */}
        <div className="reveal reveal-delay-1" style={{ display: "flex", gap: 0, marginBottom: 2, width: "fit-content" }}>
          {VILLAS.map((v, i) => (
            <button key={v.id} onClick={() => setActive(i)} style={{ padding: "12px 28px", fontSize: 11, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", fontFamily: "var(--font-body)", background: i === active ? "var(--gold)" : "rgba(255,255,255,0.04)", color: i === active ? "#0d0f1a" : "rgba(255,255,255,0.5)", border: "1px solid", borderColor: i === active ? "var(--gold)" : "rgba(255,255,255,0.1)", borderRadius: "var(--r)", cursor: "pointer", transition: "all 200ms ease", marginRight: 4 }}>
              {v.type}
            </button>
          ))}
        </div>

        {/* Villa detail panel */}
        <div className="reveal reveal-delay-2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "var(--r)", overflow: "hidden" }}>
          {/* Image */}
          <div style={{ height: 480, overflow: "hidden", position: "relative" }}>
            <img src={villa.img} alt={villa.name} style={{ width: "100%", height: "120%", objectFit: "cover", display: "block", transition: "opacity 400ms ease" }} key={villa.id} />
            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to right, transparent 60%, rgba(13,15,26,0.6))" }} />
            <div style={{ position: "absolute", top: 20, left: 20 }}>
              <span style={{ display: "inline-block", padding: "4px 12px", background: villa.accent + "22", border: `1px solid ${villa.accent}55`, borderRadius: "var(--r)", fontSize: 10, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: villa.accent }}>{villa.tag}</span>
            </div>
          </div>

          {/* Content */}
          <div style={{ padding: "48px 44px", display: "flex", flexDirection: "column" }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.22em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: 10 }}>{villa.type}</div>
            <h3 style={{ fontFamily: "var(--font-display)", fontSize: 40, fontWeight: 500, color: "white", lineHeight: 1, marginBottom: 28, whiteSpace: "pre-line" }}>{villa.name}</h3>

            {/* Specs grid */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "14px 20px", paddingBottom: 28, borderBottom: "1px solid rgba(255,255,255,0.08)", marginBottom: 28 }}>
              {[["Area", villa.size], ["Capacity", villa.capacity], ["Bed Type", villa.bed], ["View", villa.view]].map(([k, v]) => (
                <div key={k}>
                  <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.14em", textTransform: "uppercase", color: "rgba(255,255,255,0.3)", marginBottom: 3 }}>{k}</div>
                  <div style={{ fontSize: 13, color: "rgba(255,255,255,0.8)", fontWeight: 500 }}>{v}</div>
                </div>
              ))}
            </div>

            {/* Amenities */}
            <ul style={{ listStyle: "none", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 16px", marginBottom: "auto", paddingBottom: 32 }}>
              {villa.amenities.map(a => (
                <li key={a} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: "rgba(255,255,255,0.6)" }}>
                  <span style={{ color: "var(--gold)", fontSize: 7 }}>◆</span>{a}
                </li>
              ))}
            </ul>

            {/* Price + CTA */}
            <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.08)" }}>
              <div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 2 }}>From</div>
                <div style={{ fontFamily: "var(--font-display)", fontSize: 38, fontWeight: 500, color: "var(--gold)", lineHeight: 1 }}>{villa.price}</div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", marginTop: 2 }}>{villa.priceNote}</div>
              </div>
              <button onClick={onBook} style={{ padding: "13px 28px", background: "var(--gold)", color: "#0d0f1a", border: "none", borderRadius: "var(--r)", fontSize: 11, fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", cursor: "pointer", fontFamily: "var(--font-body)" }}>
                Reserve This Villa
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── APP ────────────────────────────────────────────── */
function App() {
  const [booking, setBooking] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useScrollReveal();

  useEffect(() => {
    // Loader
    const t = setTimeout(() => {
      const loader = document.getElementById("loader");
      if (loader) loader.classList.add("out");
    }, 1200);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 60);
    window.addEventListener("scroll", h, { passive: true });
    return () => window.removeEventListener("scroll", h);
  }, []);

  return (
    <>
      <Nav onBook={() => setBooking(true)} scrolled={scrolled} />
      <Hero onBook={() => setBooking(true)} />
      <FeaturesStrip onBook={() => setBooking(true)} />
      <VillasSection onBook={() => setBooking(true)} />
      <ExperienceSection />
      <FullBleedQuote />
      <Footer onBook={() => setBooking(true)} />
      {booking && <BookingModal onClose={() => setBooking(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
