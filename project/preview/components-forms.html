<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
* { box-sizing: border-box; margin: 0; }
body { background: #F8F6F1; font-family: "Manrope", sans-serif; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #5F6478; }
input, select {
  height: 48px;
  border-radius: 0;
  border: 1.5px solid rgba(29,35,64,0.14);
  background: white;
  padding: 0 14px;
  font-family: "Manrope", sans-serif;
  font-size: 14px;
  color: #1D2340;
  outline: none;
  transition: border-color 200ms ease;
}
input:focus, select:focus { border-color: #D4AF37; box-shadow: 0 0 0 3px rgba(212,175,55,0.18); }
input::placeholder { color: #9299a8; }
.booking-bar {
  grid-column: span 2;
  background: white;
  border-radius: 0;
  border: 1px solid rgba(29,35,64,0.10);
  box-shadow: 0 24px 64px rgba(17,21,34,0.10);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}
.check-btn {
  height: 48px;
  background: #D4AF37;
  color: #111522;
  border: none;
  border-radius: 0;
  font-weight: 700;
  font-size: 14px;
  padding: 0 22px;
  cursor: pointer;
  font-family: "Manrope", sans-serif;
  box-shadow: 0 8px 20px rgba(212,175,55,0.24);
}
</style>
</head>
<body>
<div class="grid">
  <div class="field-group">
    <label>Full Name</label>
    <input type="text" placeholder="Alexandra Fontaine">
  </div>
  <div class="field-group">
    <label>Email Address</label>
    <input type="email" placeholder="alex@example.com">
  </div>
  <div class="field-group">
    <label>Villa Type</label>
    <select><option>Beachfront Pool Villa</option><option>Jungle Retreat Villa</option></select>
  </div>
  <div class="field-group">
    <label>Guests</label>
    <input type="number" placeholder="2">
  </div>

  <div class="booking-bar">
    <div class="field-group">
      <label>Check In</label>
      <input type="date">
    </div>
    <div class="field-group">
      <label>Check Out</label>
      <input type="date">
    </div>
    <div class="field-group">
      <label>Guests</label>
      <select><option>2 Guests</option><option>3 Guests</option><option>4 Guests</option></select>
    </div>
    <button class="check-btn">Check Availability</button>
  </div>
</div>
</body>
</html>
