<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
* { box-sizing: border-box; margin: 0; }
body { background: #1D2340; font-family: "Manrope", sans-serif; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(2, 110px); gap: 10px; }
.img-card { border-radius: 16px; overflow: hidden; position: relative; }
.img-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-card .tag { position: absolute; bottom: 8px; left: 10px; font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
<div class="grid">
  <div class="img-card" style="grid-column:span 2;">
    <img src="../assets/images/phuket1.png" alt="Villa at dusk">
    <span class="tag">Villa · Dusk</span>
  </div>
  <div class="img-card">
    <img src="../assets/images/phuket2.png" alt="Spa interior">
    <span class="tag">Spa</span>
  </div>
  <div class="img-card">
    <img src="../assets/images/phuket4.png" alt="Infinity pool">
    <span class="tag">Pool · Day</span>
  </div>
  <div class="img-card">
    <img src="../assets/images/phuket3.png" alt="Dining">
    <span class="tag">Dining</span>
  </div>
  <div class="img-card">
    <img src="../assets/images/phuket6.png" alt="Beach aerial">
    <span class="tag">Beach · Aerial</span>
  </div>
</div>
</body>
</html>
