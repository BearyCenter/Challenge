<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
* { box-sizing: border-box; margin: 0; }
body { background: #F8F6F1; font-family: "Cormorant Garamond", serif; padding: 20px 24px; color: #1D2340; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid rgba(29,35,64,0.08); }
.row:last-child { border-bottom: none; }
.label { font-family: "Cormorant Garamond", serif; font-size: 11px; color: #5F6478; letter-spacing: 0.12em; text-transform: uppercase; min-width: 80px; }
.sample-hero   { font-size: 52px; font-weight: 500; line-height: 0.95; }
.sample-h1     { font-size: 38px; font-weight: 500; line-height: 1.0; }
.sample-h2     { font-size: 28px; font-weight: 500; line-height: 1.1; }
.sample-h3     { font-size: 22px; font-weight: 500; line-height: 1.2; }
.sample-italic { font-size: 28px; font-weight: 400; font-style: italic; color: #D4AF37; line-height: 1.1; }
</style>
</head>
<body>
  <div class="row">
    <span class="label">Hero</span>
    <span class="sample-hero">Dusk luxury</span>
  </div>
  <div class="row">
    <span class="label">H1</span>
    <span class="sample-h1">Private Villa Escapes</span>
  </div>
  <div class="row">
    <span class="label">H2</span>
    <span class="sample-h2">Wellness & Concierge</span>
  </div>
  <div class="row">
    <span class="label">H3</span>
    <span class="sample-h3">Sunset infinity pool views</span>
  </div>
  <div class="row">
    <span class="label">Italic accent</span>
    <span class="sample-italic">with polished clarity</span>
  </div>
</body>
</html>
