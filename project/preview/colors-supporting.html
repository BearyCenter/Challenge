<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
* { box-sizing: border-box; margin: 0; }
body { background: #F8F6F1; font-family: "Manrope", sans-serif; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; }
.swatch { border-radius: 0; padding: 14px 12px 12px; min-height: 100px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid rgba(0,0,0,0.06); }
.swatch .hex { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.65; margin-bottom: 3px; }
.swatch .name { font-size: 12px; font-weight: 600; }
.swatch .role { font-size: 10px; opacity: 0.6; margin-top: 3px; line-height: 1.4; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch" style="background:#FFFDF9; color:#1D2340; border:1px solid rgba(29,35,64,0.12);">
    <span class="hex">#FFFDF9</span>
    <span class="name">Paper</span>
    <span class="role">Elevated surface</span>
  </div>
  <div class="swatch" style="background:#F4E7B0; color:#1D2340;">
    <span class="hex">#F4E7B0</span>
    <span class="name">Gold Light</span>
    <span class="role">Italic accent on dark</span>
  </div>
  <div class="swatch" style="background:#A8891E; color:#fff;">
    <span class="hex">#A8891E</span>
    <span class="name">Gold Dark</span>
    <span class="role">Hover state</span>
  </div>
  <div class="swatch" style="background:#2D3560; color:#fff;">
    <span class="hex">#2D3560</span>
    <span class="name">Navy Mid</span>
    <span class="role">Secondary dark surface</span>
  </div>
  <div class="swatch" style="background:#5F6478; color:#fff;">
    <span class="hex">#5F6478</span>
    <span class="name">Ink Soft</span>
    <span class="role">Secondary body text</span>
  </div>
</div>
</body>
</html>
