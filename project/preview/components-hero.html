<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../fonts/fonts.css">
<style>
* { box-sizing: border-box; margin: 0; }
body {
  background: linear-gradient(180deg,#1a1d2b 0%,#262334 30%,#f3ede3 60%,#f8f6f1 100%);
  font-family: "Manrope", sans-serif;
  padding: 28px 24px;
  min-height: 220px;
  display: flex;
  align-items: center;
}
.hero-copy { max-width: 540px; }
.kicker { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
h1 {
  font-family: "Cormorant Garamond", serif;
  font-weight: 500;
  font-size: 52px;
  line-height: 0.95;
  color: white;
  margin-bottom: 14px;
}
h1 span { display: block; font-style: italic; color: #F4E7B0; }
.lead { font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.7; max-width: 44ch; margin-bottom: 20px; }
.btns { display: flex; gap: 12px; }
.btn-p { background:#D4AF37; color:#111522; font-weight:700; font-size:13px; padding:12px 22px; border-radius:999px; text-decoration:none; box-shadow:0 12px 28px rgba(212,175,55,0.28); }
.btn-s { background:rgba(255,255,255,0.08); color:white; font-size:13px; padding:12px 22px; border-radius:999px; text-decoration:none; border:1px solid rgba(255,255,255,0.16); }
</style>
</head>
<body>
  <div class="hero-copy">
    <p class="kicker">Refined With Dark-Luxury Return</p>
    <h1>Dusk luxury <span>with polished clarity</span></h1>
    <p class="lead">Where the jungle meets the Andaman Sea, and no request goes unanswered.</p>
    <div class="btns">
      <a class="btn-p" href="#">Reserve Your Villa</a>
      <a class="btn-s" href="#">Explore Experiences</a>
    </div>
  </div>
</body>
</html>
