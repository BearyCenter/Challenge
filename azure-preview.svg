    <text x="148" y="512" fill="#F8F0E9" font-family="Arial, sans-serif" font-size="28">Luxury interior mood inspired by Phuket dusk, soft glass reflections,</text>
    <text x="148" y="550" fill="#F8F0E9" font-family="Arial, sans-serif" font-size="28">warm resort lighting, and villa-scale private hospitality.</text>

