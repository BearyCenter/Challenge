    <text x="984" y="1910" fill="#F4DFA3" font-family="Arial, sans-serif" font-size="18" letter-spacing="3">BOOKING PANELS</text>
    <text x="984" y="1966" fill="#FFF9F2" font-family="Georgia, serif" font-size="44">High clarity, low friction</text>
    <text x="984" y="2022" fill="#F7F0E9" font-family="Arial, sans-serif" font-size="24">Darker contrast blocks for dates, rates, villa count, and confirmation flow.</text>
