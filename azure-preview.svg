    <text x="924" y="314" fill="#FFF6EF" font-family="Arial, sans-serif" font-size="22">Soft sunlight, muted violet sky,</text>
    <text x="924" y="346" fill="#FFF6EF" font-family="Arial, sans-serif" font-size="22">natural wood, premium quietness.</text>
