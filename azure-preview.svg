    <text x="140" y="1966" fill="#1C2231" font-family="Georgia, serif" font-size="44">Immersive villa storytelling</text>
    <text x="140" y="2022" fill="#5D5A67" font-family="Arial, sans-serif" font-size="24">Large display type, panoramic media, and soft glass support panels.</text>

